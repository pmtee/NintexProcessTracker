apiVersion: apps/v1
kind: Deployment
metadata:
  name: processtracker
  namespace: processtracker
  labels:
    app: processtracker
    version: v2.0.0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: processtracker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: processtracker
        version: v2.0.0
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: processtracker
          image: phethot/process-tracker:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: processtracker-config
          env:
            - name: AWS__AccessKeyId
              valueFrom:
                secretKeyRef:
                  name: processtracker-secrets
                  key: AWS_ACCESS_KEY_ID
                  optional: true
            - name: AWS__SecretAccessKey
              valueFrom:
                secretKeyRef:
                  name: processtracker-secrets
                  key: AWS_SECRET_ACCESS_KEY
                  optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          volumeMounts:
            - name: data-volume
              mountPath: /app/data
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: processtracker-pvc
