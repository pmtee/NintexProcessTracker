name: CI/CD — Test · Build · Push · Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  DOCKER_IMAGE: phethot/process-tracker
  DOTNET_VERSION: '8.0.x'

jobs:

  # ── JOB 1: RUN ALL TESTS ──────────────────────────────────
  test:
    name: xUnit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal

  # ── JOB 2: BUILD AND PUSH DOCKER IMAGE ────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── JOB 3: DEPLOY TO KUBERNETES ───────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Apply manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/pvc.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/hpa.yaml
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}

      - name: Update image
        run: |
          kubectl set image deployment/processtracker \
            processtracker=${{ env.DOCKER_IMAGE }}:${{ github.sha }} \
            -n processtracker
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}

      - name: Verify rollout
        run: kubectl rollout status deployment/processtracker -n processtracker --timeout=120s
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}
